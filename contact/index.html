<section class="section light-section">
  <div class="container contact-wrap">
    <div class="contact-details">
      <h2>Contact Details</h2>
      <div class="contact-item">
        <div class="value"><a href="mailto:info@provideoinc.com">info@provideoinc.com</a></div>
        <div class="label">Email Address</div>
      </div>
      <div class="contact-item">
        <div class="value"><a href="tel:4046543820">404 654-3820</a></div>
        <div class="label">Phone Number</div>
      </div>
    </div>

    <form class="contact-form" data-static-form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY">
      <input type="hidden" name="subject" value="New contact form submission from provideoinc.com">
      <div class="form-grid">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          <input type="text" name="name" placeholder="Name of Business and contact person" required>
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8 9.9a16 16 0 0 0 6 6l1.4-1.4a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.8 2z"/></svg>
          <input type="tel" name="phone" placeholder="Phone">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <input type="text" name="event_dates" placeholder="What are your event dates?">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          <input type="text" name="primary_goal" placeholder="What is your primary goal?">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          <input type="text" name="av_scope" placeholder="What is the scope of your AV and Video Production needs?">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          <input type="text" name="budget" placeholder="What is your budget for the event?">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a4a52" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          <input type="text" name="video_usage" placeholder="How are you using video during and after the event?">
        </div>
      </div>
      <button type="submit" class="btn btn-solid">Submit</button>
    </form>
